networks:
  app:
    driver: bridge

services:
  backend:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
      target: prod
    networks:
      - app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 5s
    environment:
      MARIADB_DATABASE: "${MARIADB_DATABASE}"
      MARIADB_USER: "${MARIADB_USER}"
      MARIADB_PASSWORD: "${MARIADB_PASSWORD}"
      MARIADB_MIGRATION_USER: "${MARIADB_MIGRATION_USER}"
      MARIADB_MIGRATION_PASSWORD: "${MARIADB_MIGRATION_PASSWORD}"

  db:
    image: mariadb:11.8.6 # lts
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin --silent ping -h localhost -u\"$MARIADB_USER\" -p\"$MARIADB_PASSWORD\" >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
      start_interval: 5s
    networks:
      - app
    environment:
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD}"
      MARIADB_ROOT_HOST: "localhost"
      MARIADB_DATABASE: "${MARIADB_DATABASE}"
      MARIADB_USER: "${MARIADB_USER}"
      MARIADB_PASSWORD: "${MARIADB_PASSWORD}"
      MARIADB_MIGRATION_USER: "${MARIADB_MIGRATION_USER}"
      MARIADB_MIGRATION_PASSWORD: "${MARIADB_MIGRATION_PASSWORD}"
    volumes:
      - db_data:/var/lib/mysql
      # consider enabling this *ONLY* for the initial creation of the db
      #- ./docker/db/init.sh:/docker-entrypoint-initdb.d/init.sh:ro

volumes:
  db_data:
