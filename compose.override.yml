volumes:
  caddy_data:
  caddy_config:

services:
  caddy:
    image: caddy:latest
    ports:
      - "${LISTEN_IP}:80:80"
      - "${LISTEN_IP}:443:443"
      - "${LISTEN_IP}:5173:5173"
    environment:
      - LISTEN_DOMAIN=${LISTEN_DOMAIN}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./docker/caddy/certs:/certs
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app

  db:
    environment:
      MARIADB_ROOT_HOST: "%"
    volumes:
      - ./docker/db/init.sh:/docker-entrypoint-initdb.d/init.sh:ro

  backend:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
      target: dev
      args:
        UID: "${UID}"
        GID: "${GID}"
    healthcheck:
      test: []
    user: "${UID}:${GID}"
    environment:
      - UID=${UID}
      - GID=${GID}
      - LISTEN_DOMAIN=${LISTEN_DOMAIN}
      - XDEBUG_PORT=${XDEBUG_PORT}
    networks:
      - app
    volumes:
      - .:/var/www/html
      - ./docker/backend/php/conf.d/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini # enable xdebug
      - ./docker/backend/apache2/sites-available/dev.conf:/etc/apache2/sites-enabled/dev.conf # access db and mail via backend
      - /etc/hosts:/tmp/hosts:ro # allow post-create-project to check existing host entries
    extra_hosts:
      - "host.docker.internal:host-gateway" # ensure xdebug can reach the host

  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
      target: dev
      args:
        UID: "${UID}"
        GID: "${GID}"
    user: "${UID}:${GID}"
    environment:
      - UID=${UID}
      - GID=${GID}
    volumes:
      - .:/app
    networks:
      - app
    expose:
      - "5173"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    networks:
      - app
    expose:
      - "1025"
      - "8025"
    environment:
      MAILPIT_SMTP_BIND_ADDR: 0.0.0.0:1025
      MAILPIT_WEB_BIND_ADDR: 0.0.0.0:8025

  adminer:
    # custom Adminer image with autologin based on github.com/jeliebig/Adminer-Autologin
    build:
      context: ./docker/adminer
      dockerfile: ./Dockerfile
    restart: unless-stopped
    networks:
      - app
    expose:
      - "8080"
    environment:
      ADMINER_DESIGN: ichier
      ADMINER_PLUGINS: login-env-vars
      ADMINER_DRIVER: server
      ADMINER_SERVER: db
      ADMINER_USERNAME: root
      ADMINER_PASSWORD: "${MARIADB_ROOT_PASSWORD}"
      ADMINER_DB: "${MARIADB_DATABASE}"
